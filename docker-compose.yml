services:
  postgres:
    image: postgres:15-alpine
    container_name: superdulces_postgres
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d
    networks:
      - superdulces_network

volumes:
  pgdata:
    driver: local

networks:
  superdulces_network:
    driver: bridge